<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript">document.oncontextmenu = function(){return false;}</script>
    <title>Panel de Control</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CORRECCIÓN INTEGRAL SIN PERDER EL CONTENEDOR BLANCO --- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; /* Forzamos el alto total del navegador */
        }

        body {
            display: flex;
            flex-direction: column; /* Header -> Contenido (Main) -> Footer */
            min-height: 100vh;
        }

        /* Contenedor principal invisible que ocupa el espacio intermedio y centra la caja central */
        main {
            flex: 1 0 auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        footer {
            flex-shrink: 0; /* Evita que el footer se deforme o achique */
        }
    </style>
</head>
<body> 
    <header>    
        <div class="logo-texto">📦 Area de selección</div>
        <a href="#" id="btnSalir" class="btn-header">🚪 SALIR</a>
    </header>

    <main>
        <div id="panel-box" class="caja-central">
            <h1>Panel de Control</h1>
            <p style="color: #444; margin-bottom: 30px; font-weight: 500;">Seleccione una operación para continuar:</p>

            <div class="contenedor-menu" id="contenedor-botones">
                <a href="formulario.html" class="btn-menu">➕ Nueva Reserva</a>
                <a href="lista.html" class="btn-menu">📋 Ver Lista de Reservas</a>
                <a href="procesos.html" class="btn-menu" style="background-color: #585b70;">📖 Manual de Procesos</a>
                <a href="actualizar.html" class="btn-menu btn-destacado" id="btnActualizar">📈 Actualizar Precios</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-creador-container">
            <span class="texto-creado">Creado por:</span>
            <img src="./img/New_Logo_OB.png" alt="One Box Logo" class="footer-logo">
        </div>

        <div class="footer-centro">
            <div class="footer-links">
                <a href="soporte.html" onclick="registrarOrigenSoporte()">Soporte</a>
            </div>
            <p>&copy; 2026 Tu Sistema de Reservas. Todos los derechos reservados.</p>
        </div>

        <div class="footer-version-container">
            <div class="footer-version">v4.5.0</div>
        </div>
    </footer>

    <script>
        function registrarOrigenSoporte() {
            const paginaActual = window.location.pathname.split('/').pop() || 'Inicio';
            sessionStorage.setItem('origen_soporte', paginaActual);
        }
    </script>

    <div id="modalSoporte" class="modal-overlay">
        <div class="modal-caja">
            <h3 style="color: #89b4fa;">🛠️ Soporte Técnico</h3>
            <form id="formSoporte">
                <label style="color: #bac2de;">Tipo de solicitud:</label>
                <select id="tipo_ticket" required>
                    <option value="Falla">Reportar Falla</option>
                    <option value="Modificacion">Solicitar Modificación</option>
                    <option value="Sugerencia">Sugerencia</option>
                </select>
                <label style="color: #bac2de; margin-top: 10px;">Descripción detallada:</label>
                <textarea id="desc_ticket" required placeholder="Describe el problema o sugerencia..."></textarea>
                <div class="modal-botones">
                    <button type="submit" class="btn-azul">ENVIAR TICKET</button>
                    <button type="button" onclick="cerrarSoporte()" class="btn-secundario">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalAviso" class="modal-overlay">
        <div class="modal-caja" id="bordeModal">
            <h3 id="tituloAviso"></h3>
            <p id="textoAviso" style="color: #fff; margin-bottom: 20px;"></p>
            <div class="modal-botones">
                <button onclick="cerrarAviso()" class="btn-azul" id="btnColorAviso">Aceptar</button>
            </div>
        </div>
    </div>

    <script>
        // --- SEGURIDAD Y SESIÓN ---
        const nombre = sessionStorage.getItem('usuario_nombre');
        const sucursal = sessionStorage.getItem('usuario_sucursal');
        const rol = sessionStorage.getItem('usuario_rol'); 

        if (!nombre) {
            window.location.href = 'index.html';
        }

        // --- LÓGICA DE VISIBILIDAD PARA ADMIN ---
        document.addEventListener('DOMContentLoaded', () => {
            const btnActualizar = document.getElementById('btnActualizar');
            if (rol !== 'admin' && btnActualizar) {
                btnActualizar.remove(); 
            }
            
            if (nombre) {
                // Volvemos al color de texto oscuro #444 para que resalte perfecto adentro del contenedor blanco
                document.querySelector('h1').innerHTML = `Hola, <span style="color:#4a90e2; font-weight: bold;">${sucursal || nombre}</span>`;
            }
        });

        // Botón Salir
        document.getElementById('btnSalir').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.clear();
            window.location.href = 'index.html';
        });

        // --- GESTIÓN DE MODALES ---
        function mostrarAviso(titulo, mensaje, esError = true) {
            const modal = document.getElementById('modalAviso');
            const tituloH3 = document.getElementById('tituloAviso');
            const textoP = document.getElementById('textoAviso');
            const borde = document.getElementById('bordeModal');
            const btn = document.getElementById('btnColorAviso');
            tituloH3.textContent = titulo;
            textoP.textContent = mensaje;
            const color = esError ? '#f38ba8' : '#a6e3a1';
            tituloH3.style.color = color;
            borde.style.borderColor = color;
            btn.style.backgroundColor = color;
            modal.style.display = 'flex';
        }

        function cerrarAviso() { document.getElementById('modalAviso').style.display = 'none'; }
        function abrirSoporte() { document.getElementById('modalSoporte').style.display = 'flex'; }
        function cerrarSoporte() { document.getElementById('modalSoporte').style.display = 'none'; }

        // --- ENVÍO DE SOPORTE CORREGIDO ---
        document.getElementById('formSoporte').addEventListener('submit', async function(e) {
            e.preventDefault();
            const datos = {
                tipo: document.getElementById('tipo_ticket').value,
                mensaje: document.getElementById('desc_ticket').value,
                usuario: sessionStorage.getItem('usuario_nombre') || 'Usuario Panel'
            };
            try {
                const res = await fetch('/admin/soporte', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                if (res.ok) {
                    cerrarSoporte();
                    this.reset();
                    mostrarAviso('✅ Enviado', 'Ticket de soporte recibido correctamente.', false);
                } else {
                    mostrarAviso('❌ Error', 'No se pudo enviar el ticket.', true);
                }
            } catch {
                mostrarAviso('❌ Error', 'Falla de red con el servidor.', true);
            }
        });
    </script>
</body>
</html>
